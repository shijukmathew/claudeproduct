<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeatherApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet"/>
  <style>
    html, body { height: 100%; margin: 0; }

    /* ── Dynamic weather backgrounds (muted, easy on the eye) ── */
    .bg-clear  { background: linear-gradient(160deg, #5b9bd5 0%, #89bdd3 100%); }
    .bg-cloudy { background: linear-gradient(160deg, #607d8b 0%, #90a4ae 100%); }
    .bg-fog    { background: linear-gradient(160deg, #9eacb4 0%, #c8d6df 100%); }
    .bg-rain   { background: linear-gradient(160deg, #3a5068 0%, #546e7a 100%); }
    .bg-snow   { background: linear-gradient(160deg, #90afc5 0%, #c9dde8 100%); }
    .bg-storm  { background: linear-gradient(160deg, #2e3b47 0%, #455a64 100%); }
    .bg-default{ background: linear-gradient(160deg, #3d6b99 0%, #5c8ab8 100%); }

    .page-wrap { min-height: 100vh; transition: background 0.6s ease; }

    /* ── Header ───────────────────────────────────────────────── */
    .top-bar { backdrop-filter: blur(6px); background: rgba(0,0,0,.18); }

    /* ── Search box ───────────────────────────────────────────── */
    .search-input {
      background: rgba(255,255,255,.2);
      border: 1.5px solid rgba(255,255,255,.5);
      color: white;
      border-radius: 50px;
      padding: .6rem 1.4rem;
      font-size: 1.05rem;
      width: 300px;
      max-width: 90vw;
    }
    .search-input::placeholder { color: rgba(255,255,255,.7); }
    .search-input:focus {
      outline: none;
      background: rgba(255,255,255,.3);
      border-color: white;
      box-shadow: 0 0 0 3px rgba(255,255,255,.25);
      color: white;
    }
    /* ── Tom Select: glassmorphism overrides ─────────────────── */
    .ts-wrapper { width: 220px; }
    .ts-wrapper.single .ts-control,
    .ts-wrapper.single.input-active .ts-control {
      background: rgba(255,255,255,.2) !important;
      border: 1.5px solid rgba(255,255,255,.5) !important;
      border-radius: 50px !important;
      box-shadow: none !important;
      padding: .55rem 2.2rem .55rem 1.2rem !important;
      cursor: pointer;
    }
    .ts-wrapper.single.focus .ts-control {
      background: rgba(255,255,255,.3) !important;
      border-color: white !important;
      box-shadow: 0 0 0 3px rgba(255,255,255,.25) !important;
    }
    .ts-control .item,
    .ts-control input { color: white !important; font-size: .95rem; }
    .ts-control input::placeholder { color: rgba(255,255,255,.7) !important; }
    .ts-wrapper .ts-control:after { border-top-color: rgba(255,255,255,.8) !important; }
    .ts-dropdown {
      background: rgba(38, 64, 88, .96) !important;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.2) !important;
      border-radius: 14px !important;
      overflow: hidden;
      margin-top: 4px;
    }
    .ts-dropdown .ts-option { color: rgba(255,255,255,.9) !important; padding: .55rem 1.1rem; }
    .ts-dropdown .ts-option.active { background: rgba(255,255,255,.18) !important; color: white !important; }
    .ts-dropdown .ts-option.selected { background: rgba(255,255,255,.1) !important; }
    .ts-dropdown-content { max-height: 260px; }
    /* Search input inside the dropdown */
    .ts-dropdown .ts-dropdown-header input {
      background: rgba(255,255,255,.1);
      border: none;
      border-bottom: 1px solid rgba(255,255,255,.2);
      color: white;
      padding: .5rem 1rem;
    }
    .search-btn {
      border-radius: 50px;
      padding: .6rem 1.6rem;
      background: rgba(255,255,255,.25);
      border: 1.5px solid rgba(255,255,255,.5);
      color: white;
      font-weight: 600;
      transition: background .2s;
    }
    .search-btn:hover { background: rgba(255,255,255,.4); color: white; }

    /* ── Weather card ─────────────────────────────────────────── */
    .weather-card {
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 24px;
    }
    .weather-icon { font-size: 5rem; line-height: 1; }
    .temp-display { font-size: 5.5rem; font-weight: 700; line-height: 1; }

    /* ── Saved city chips ─────────────────────────────────────── */
    .city-chip {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 50px;
      backdrop-filter: blur(8px);
      transition: background .2s, transform .1s;
    }
    .city-chip:hover { background: rgba(255,255,255,.28); transform: translateY(-1px); }
    .chip-delete {
      background: rgba(255,255,255,.15);
      border: none;
      color: inherit;
      border-radius: 50%;
      width: 22px; height: 22px;
      line-height: 1;
      padding: 0;
      font-size: .75rem;
      transition: background .15s;
    }
    .chip-delete:hover { background: rgba(255,0,0,.35); }

    /* ── Login button ─────────────────────────────────────────── */
    .github-btn {
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.5);
      color: white;
      border-radius: 50px;
      padding: .4rem 1.1rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s;
    }
    .github-btn:hover { background: rgba(255,255,255,.28); color: white; }
  </style>
</head>
<body>

<div th:class="'page-wrap ' + ${weather != null ? weather.backgroundClass : 'bg-default'}">

  <!-- ── Top bar ─────────────────────────────────────────────────── -->
  <div class="top-bar py-3 px-4 d-flex justify-content-between align-items-center flex-wrap gap-2">

    <span class="text-white fw-bold fs-5">
      <i class="bi bi-cloud-sun-fill me-2"></i>WeatherApp
    </span>

    <!-- Logged in -->
    <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
      <img th:src="${avatarUrl}" alt="avatar"
           class="rounded-circle" width="32" height="32"
           style="border:2px solid rgba(255,255,255,.6)"/>
      <span class="text-white fw-medium small" th:text="${username}"></span>
      <form th:action="@{/logout}" method="post" class="mb-0">
        <button class="github-btn btn btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </form>
    </div>

    <!-- Not logged in -->
    <div sec:authorize="!isAuthenticated()">
      <a href="/oauth2/authorization/github" class="github-btn">
        <i class="bi bi-github me-2"></i>Login with GitHub
      </a>
    </div>

  </div>

  <div th:class="${weather != null ? weather.textClass : 'text-white'} + ' container py-4'">

    <!-- ── Flash messages ───────────────────────────────────────── -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3" role="alert">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${info}" class="alert alert-info alert-dismissible fade show mb-3" role="alert">
      <i class="bi bi-info-circle-fill me-2"></i><span th:text="${info}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- ── Search bar ────────────────────────────────────────────── -->
    <div class="d-flex justify-content-center mb-5">
      <form action="/" method="get" class="d-flex gap-2 flex-wrap justify-content-center align-items-center">

        <input type="text" name="city" class="search-input"
               placeholder="City name..."
               th:value="${weather != null ? weather.cityName : ''}"
               autocomplete="off" required/>

        <select id="countryCode" name="countryCode">
          <option value="">🌍 Any Country</option>
          <option value="AU" th:selected="${selectedCountry == 'AU'}">🇦🇺 Australia</option>
          <option value="AT" th:selected="${selectedCountry == 'AT'}">🇦🇹 Austria</option>
          <option value="BD" th:selected="${selectedCountry == 'BD'}">🇧🇩 Bangladesh</option>
          <option value="BE" th:selected="${selectedCountry == 'BE'}">🇧🇪 Belgium</option>
          <option value="BR" th:selected="${selectedCountry == 'BR'}">🇧🇷 Brazil</option>
          <option value="CA" th:selected="${selectedCountry == 'CA'}">🇨🇦 Canada</option>
          <option value="CL" th:selected="${selectedCountry == 'CL'}">🇨🇱 Chile</option>
          <option value="CN" th:selected="${selectedCountry == 'CN'}">🇨🇳 China</option>
          <option value="CO" th:selected="${selectedCountry == 'CO'}">🇨🇴 Colombia</option>
          <option value="HR" th:selected="${selectedCountry == 'HR'}">🇭🇷 Croatia</option>
          <option value="CZ" th:selected="${selectedCountry == 'CZ'}">🇨🇿 Czech Republic</option>
          <option value="DK" th:selected="${selectedCountry == 'DK'}">🇩🇰 Denmark</option>
          <option value="EG" th:selected="${selectedCountry == 'EG'}">🇪🇬 Egypt</option>
          <option value="FI" th:selected="${selectedCountry == 'FI'}">🇫🇮 Finland</option>
          <option value="FR" th:selected="${selectedCountry == 'FR'}">🇫🇷 France</option>
          <option value="DE" th:selected="${selectedCountry == 'DE'}">🇩🇪 Germany</option>
          <option value="GH" th:selected="${selectedCountry == 'GH'}">🇬🇭 Ghana</option>
          <option value="GR" th:selected="${selectedCountry == 'GR'}">🇬🇷 Greece</option>
          <option value="HU" th:selected="${selectedCountry == 'HU'}">🇭🇺 Hungary</option>
          <option value="IN" th:selected="${selectedCountry == 'IN'}">🇮🇳 India</option>
          <option value="ID" th:selected="${selectedCountry == 'ID'}">🇮🇩 Indonesia</option>
          <option value="IE" th:selected="${selectedCountry == 'IE'}">🇮🇪 Ireland</option>
          <option value="IL" th:selected="${selectedCountry == 'IL'}">🇮🇱 Israel</option>
          <option value="IT" th:selected="${selectedCountry == 'IT'}">🇮🇹 Italy</option>
          <option value="JP" th:selected="${selectedCountry == 'JP'}">🇯🇵 Japan</option>
          <option value="KE" th:selected="${selectedCountry == 'KE'}">🇰🇪 Kenya</option>
          <option value="MY" th:selected="${selectedCountry == 'MY'}">🇲🇾 Malaysia</option>
          <option value="MX" th:selected="${selectedCountry == 'MX'}">🇲🇽 Mexico</option>
          <option value="MA" th:selected="${selectedCountry == 'MA'}">🇲🇦 Morocco</option>
          <option value="NL" th:selected="${selectedCountry == 'NL'}">🇳🇱 Netherlands</option>
          <option value="NZ" th:selected="${selectedCountry == 'NZ'}">🇳🇿 New Zealand</option>
          <option value="NG" th:selected="${selectedCountry == 'NG'}">🇳🇬 Nigeria</option>
          <option value="NO" th:selected="${selectedCountry == 'NO'}">🇳🇴 Norway</option>
          <option value="PK" th:selected="${selectedCountry == 'PK'}">🇵🇰 Pakistan</option>
          <option value="PE" th:selected="${selectedCountry == 'PE'}">🇵🇪 Peru</option>
          <option value="PH" th:selected="${selectedCountry == 'PH'}">🇵🇭 Philippines</option>
          <option value="PL" th:selected="${selectedCountry == 'PL'}">🇵🇱 Poland</option>
          <option value="PT" th:selected="${selectedCountry == 'PT'}">🇵🇹 Portugal</option>
          <option value="RO" th:selected="${selectedCountry == 'RO'}">🇷🇴 Romania</option>
          <option value="RU" th:selected="${selectedCountry == 'RU'}">🇷🇺 Russia</option>
          <option value="SA" th:selected="${selectedCountry == 'SA'}">🇸🇦 Saudi Arabia</option>
          <option value="SG" th:selected="${selectedCountry == 'SG'}">🇸🇬 Singapore</option>
          <option value="ZA" th:selected="${selectedCountry == 'ZA'}">🇿🇦 South Africa</option>
          <option value="KR" th:selected="${selectedCountry == 'KR'}">🇰🇷 South Korea</option>
          <option value="ES" th:selected="${selectedCountry == 'ES'}">🇪🇸 Spain</option>
          <option value="SE" th:selected="${selectedCountry == 'SE'}">🇸🇪 Sweden</option>
          <option value="CH" th:selected="${selectedCountry == 'CH'}">🇨🇭 Switzerland</option>
          <option value="TH" th:selected="${selectedCountry == 'TH'}">🇹🇭 Thailand</option>
          <option value="TR" th:selected="${selectedCountry == 'TR'}">🇹🇷 Turkey</option>
          <option value="UA" th:selected="${selectedCountry == 'UA'}">🇺🇦 Ukraine</option>
          <option value="AE" th:selected="${selectedCountry == 'AE'}">🇦🇪 UAE</option>
          <option value="GB" th:selected="${selectedCountry == 'GB'}">🇬🇧 United Kingdom</option>
          <option value="US" th:selected="${selectedCountry == 'US'}">🇺🇸 United States</option>
          <option value="VN" th:selected="${selectedCountry == 'VN'}">🇻🇳 Vietnam</option>
        </select>

        <button type="submit" class="search-btn btn">
          <i class="bi bi-search me-1"></i>Search
        </button>
      </form>
    </div>

    <!-- ── Weather error ─────────────────────────────────────────── -->
    <div th:if="${weatherError}" class="text-center py-5">
      <i class="bi bi-exclamation-circle display-4 d-block mb-3 opacity-75"></i>
      <p class="fs-5" th:text="${weatherError}"></p>
    </div>

    <!-- ── Main weather card ─────────────────────────────────────── -->
    <div th:if="${weather}" class="weather-card p-4 p-md-5 mx-auto mb-5" style="max-width:560px;">

      <!-- City, region & country -->
      <div class="text-center mb-3">
        <h2 class="fw-bold mb-0">
          <i class="bi bi-geo-alt-fill me-1 opacity-75"></i>
          <span th:text="${weather.cityName}"></span>
        </h2>
        <p class="opacity-75 mb-0">
          <span th:if="${weather.region != null and !weather.region.isEmpty()}"
                th:text="${weather.region} + ', '"></span>
          <span th:text="${weather.country}"></span>
        </p>
      </div>

      <!-- Icon + temperature -->
      <div class="text-center my-4">
        <div class="weather-icon mb-2">
          <i th:class="'bi ' + ${weather.icon}"></i>
        </div>
        <div class="temp-display" th:text="${weather.temperature} + '°C'"></div>
        <p class="fs-4 mt-1 opacity-90" th:text="${weather.condition}"></p>
      </div>

      <!-- Stats row -->
      <div class="d-flex justify-content-center gap-4 mb-4 flex-wrap">
        <div class="text-center">
          <div class="opacity-75 small mb-1"><i class="bi bi-wind me-1"></i>Wind</div>
          <div class="fw-semibold" th:text="${weather.windSpeed} + ' km/h'"></div>
        </div>
        <div class="text-center">
          <div class="opacity-75 small mb-1"><i class="bi bi-droplet-fill me-1"></i>Humidity</div>
          <div class="fw-semibold" th:text="${weather.humidity} + '%'"></div>
        </div>
        <div class="text-center">
          <div class="opacity-75 small mb-1"><i class="bi bi-broadcast-pin me-1"></i>Code</div>
          <div class="fw-semibold" th:text="'WMO ' + ${weather.weatherCode}"></div>
        </div>
      </div>

      <!-- Save to favourites (only when logged in) -->
      <div sec:authorize="isAuthenticated()" class="text-center">
        <form th:action="@{/cities/save}" method="post" class="d-inline">
          <input type="hidden" name="cityName"  th:value="${weather.cityName}"/>
          <input type="hidden" name="country"   th:value="${weather.country}"/>
          <input type="hidden" name="latitude"  th:value="${weather.latitude}"/>
          <input type="hidden" name="longitude" th:value="${weather.longitude}"/>
          <button type="submit" class="search-btn btn">
            <i class="bi bi-star-fill me-2"></i>Save to Favourites
          </button>
        </form>
      </div>

      <!-- Prompt to login to save -->
      <div sec:authorize="!isAuthenticated()" class="text-center opacity-75 small">
        <i class="bi bi-lock me-1"></i>
        <a href="/oauth2/authorization/github" class="link-light">Login with GitHub</a>
        to save favourite cities
      </div>

    </div>

    <!-- ── Saved cities ───────────────────────────────────────────── -->
    <div sec:authorize="isAuthenticated()">

      <h5 class="fw-semibold mb-3 text-center opacity-90">
        <i class="bi bi-star-fill me-2"></i>My Favourite Cities
      </h5>

      <!-- No saved cities yet -->
      <div th:if="${#lists.isEmpty(savedCities)}" class="text-center opacity-60 small pb-4">
        No favourites yet — search for a city and save it.
      </div>

      <!-- City chips -->
      <div th:unless="${#lists.isEmpty(savedCities)}"
           class="d-flex flex-wrap justify-content-center gap-2 pb-4">

        <div th:each="city : ${savedCities}"
             class="city-chip d-flex align-items-center gap-2 px-3 py-2">

          <!-- Click chip → search that city -->
          <form th:action="@{/}" method="get" class="mb-0">
            <input type="hidden" name="city" th:value="${city.cityName}"/>
            <button type="submit" class="btn btn-link p-0 text-inherit fw-medium"
                    style="color:inherit; text-decoration:none;">
              <i class="bi bi-geo-alt me-1 opacity-75"></i>
              <span th:text="${city.cityName}"></span>
              <span class="opacity-60 small ms-1" th:text="'· ' + ${city.country}"></span>
            </button>
          </form>

          <!-- Delete chip -->
          <form th:action="@{/cities/delete/{id}(id=${city.id})}" method="post" class="mb-0">
            <input type="hidden" name="currentCity" th:value="${weather != null ? weather.cityName : ''}"/>
            <button type="submit" class="chip-delete" title="Remove"
                    onclick="return confirm('Remove this city?')">
              <i class="bi bi-x"></i>
            </button>
          </form>

        </div>
      </div>
    </div>

  </div><!-- /container -->
</div><!-- /page-wrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script>
  new TomSelect('#countryCode', {
    placeholder: '🌍 Any Country',
    allowEmptyOption: true,
    maxOptions: null,
    highlight: true
  });
</script>
</body>
</html>
