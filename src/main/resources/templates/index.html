<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${weather.cityName()} + ' · WeatherApp'">WeatherApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/styles.css}"/>
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css" rel="stylesheet"/>
</head>
<body>

<div th:class="'page-shell sky-' + ${weather.backgroundClass().replace('bg-','')}">

  <!-- Animated weather particles -->
  <div class="particles" aria-hidden="true"></div>

  <!-- ── Top navigation ──────────────────────────────────────── -->
  <header class="appbar">
    <a class="brand" href="/">
      <span class="brand-icon">🌤</span>
      WeatherApp
    </a>
    <nav class="nav-links">
      <a class="nav-btn" href="#forecast">Forecast ↓</a>
    </nav>
  </header>

  <!-- ── Stage ───────────────────────────────────────────────── -->
  <section class="stage">

    <!-- Search card -->
    <div class="search-zone">
      <div class="search-card">
        <form class="search-row" action="/" method="get">
          <input class="search-input" type="text" name="city"
                 placeholder="Search any city..."
                 th:value="${weather.cityName()}"
                 autocomplete="off" required/>
          <select id="countryCode" name="countryCode">
            <option value="">Any country</option>
            <option value="AU" th:selected="${selectedCountry=='AU'}">🇦🇺 Australia</option>
            <option value="AT" th:selected="${selectedCountry=='AT'}">🇦🇹 Austria</option>
            <option value="BD" th:selected="${selectedCountry=='BD'}">🇧🇩 Bangladesh</option>
            <option value="BE" th:selected="${selectedCountry=='BE'}">🇧🇪 Belgium</option>
            <option value="BR" th:selected="${selectedCountry=='BR'}">🇧🇷 Brazil</option>
            <option value="CA" th:selected="${selectedCountry=='CA'}">🇨🇦 Canada</option>
            <option value="CL" th:selected="${selectedCountry=='CL'}">🇨🇱 Chile</option>
            <option value="CN" th:selected="${selectedCountry=='CN'}">🇨🇳 China</option>
            <option value="CO" th:selected="${selectedCountry=='CO'}">🇨🇴 Colombia</option>
            <option value="HR" th:selected="${selectedCountry=='HR'}">🇭🇷 Croatia</option>
            <option value="CZ" th:selected="${selectedCountry=='CZ'}">🇨🇿 Czech Republic</option>
            <option value="DK" th:selected="${selectedCountry=='DK'}">🇩🇰 Denmark</option>
            <option value="EG" th:selected="${selectedCountry=='EG'}">🇪🇬 Egypt</option>
            <option value="FI" th:selected="${selectedCountry=='FI'}">🇫🇮 Finland</option>
            <option value="FR" th:selected="${selectedCountry=='FR'}">🇫🇷 France</option>
            <option value="DE" th:selected="${selectedCountry=='DE'}">🇩🇪 Germany</option>
            <option value="GH" th:selected="${selectedCountry=='GH'}">🇬🇭 Ghana</option>
            <option value="GR" th:selected="${selectedCountry=='GR'}">🇬🇷 Greece</option>
            <option value="HU" th:selected="${selectedCountry=='HU'}">🇭🇺 Hungary</option>
            <option value="IN" th:selected="${selectedCountry=='IN'}">🇮🇳 India</option>
            <option value="ID" th:selected="${selectedCountry=='ID'}">🇮🇩 Indonesia</option>
            <option value="IE" th:selected="${selectedCountry=='IE'}">🇮🇪 Ireland</option>
            <option value="IL" th:selected="${selectedCountry=='IL'}">🇮🇱 Israel</option>
            <option value="IT" th:selected="${selectedCountry=='IT'}">🇮🇹 Italy</option>
            <option value="JP" th:selected="${selectedCountry=='JP'}">🇯🇵 Japan</option>
            <option value="KE" th:selected="${selectedCountry=='KE'}">🇰🇪 Kenya</option>
            <option value="MY" th:selected="${selectedCountry=='MY'}">🇲🇾 Malaysia</option>
            <option value="MX" th:selected="${selectedCountry=='MX'}">🇲🇽 Mexico</option>
            <option value="MA" th:selected="${selectedCountry=='MA'}">🇲🇦 Morocco</option>
            <option value="NL" th:selected="${selectedCountry=='NL'}">🇳🇱 Netherlands</option>
            <option value="NZ" th:selected="${selectedCountry=='NZ'}">🇳🇿 New Zealand</option>
            <option value="NG" th:selected="${selectedCountry=='NG'}">🇳🇬 Nigeria</option>
            <option value="NO" th:selected="${selectedCountry=='NO'}">🇳🇴 Norway</option>
            <option value="PK" th:selected="${selectedCountry=='PK'}">🇵🇰 Pakistan</option>
            <option value="PE" th:selected="${selectedCountry=='PE'}">🇵🇪 Peru</option>
            <option value="PH" th:selected="${selectedCountry=='PH'}">🇵🇭 Philippines</option>
            <option value="PL" th:selected="${selectedCountry=='PL'}">🇵🇱 Poland</option>
            <option value="PT" th:selected="${selectedCountry=='PT'}">🇵🇹 Portugal</option>
            <option value="RO" th:selected="${selectedCountry=='RO'}">🇷🇴 Romania</option>
            <option value="RU" th:selected="${selectedCountry=='RU'}">🇷🇺 Russia</option>
            <option value="SA" th:selected="${selectedCountry=='SA'}">🇸🇦 Saudi Arabia</option>
            <option value="SG" th:selected="${selectedCountry=='SG'}">🇸🇬 Singapore</option>
            <option value="ZA" th:selected="${selectedCountry=='ZA'}">🇿🇦 South Africa</option>
            <option value="KR" th:selected="${selectedCountry=='KR'}">🇰🇷 South Korea</option>
            <option value="ES" th:selected="${selectedCountry=='ES'}">🇪🇸 Spain</option>
            <option value="SE" th:selected="${selectedCountry=='SE'}">🇸🇪 Sweden</option>
            <option value="CH" th:selected="${selectedCountry=='CH'}">🇨🇭 Switzerland</option>
            <option value="TH" th:selected="${selectedCountry=='TH'}">🇹🇭 Thailand</option>
            <option value="TR" th:selected="${selectedCountry=='TR'}">🇹🇷 Turkey</option>
            <option value="UA" th:selected="${selectedCountry=='UA'}">🇺🇦 Ukraine</option>
            <option value="AE" th:selected="${selectedCountry=='AE'}">🇦🇪 UAE</option>
            <option value="GB" th:selected="${selectedCountry=='GB'}">🇬🇧 United Kingdom</option>
            <option value="US" th:selected="${selectedCountry=='US'}">🇺🇸 United States</option>
            <option value="VN" th:selected="${selectedCountry=='VN'}">🇻🇳 Vietnam</option>
          </select>
          <button class="search-btn" type="submit">Search</button>
        </form>
        <div class="quick-row">
          <a class="quick-pill" href="/?city=London&countryCode=GB">London UK</a>
          <a class="quick-pill" href="/?city=London&countryCode=CA">London CA</a>
          <a class="quick-pill" href="/?city=New+York&countryCode=US">New York</a>
          <a class="quick-pill" href="/?city=Tokyo&countryCode=JP">Tokyo</a>
          <a class="quick-pill" href="/?city=Sydney&countryCode=AU">Sydney</a>
          <a class="quick-pill" href="/?city=Kochi&countryCode=IN">Kochi</a>
          <a class="quick-pill" href="/?city=Paris&countryCode=FR">Paris</a>
        </div>
      </div>
    </div>

    <!-- Current weather (centrepiece) -->
    <div class="current-weather">

      <div th:if="${weatherError}" style="padding:12px 20px; background:rgba(255,100,80,0.18); border:1px solid rgba(255,100,80,0.3); border-radius:12px; font-size:.9rem; max-width:500px; text-align:center;">
        <strong>⚠ </strong><span th:text="${weatherError}"></span>
        <br/><small style="opacity:.7">Showing sample data</small>
      </div>

      <div class="weather-display">
        <div class="main-icon weather-icon" th:classappend="' ' + ${weather.symbolClass()}" aria-hidden="true"></div>
        <div class="temp" th:text="${weather.temperature()} + '°'"></div>
      </div>

      <h1 class="city-name" th:text="${weather.cityName()}"></h1>

      <div class="city-meta">
        <span class="region-country">
          <span th:if="${!weather.region().isBlank()}" th:text="${weather.region()} + ' · '"></span>
          <span th:text="${weather.country()}"></span>
        </span>
        <span class="condition-badge" th:text="${weather.condition()}"></span>
      </div>
    </div>

    <!-- Stats row -->
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-label">Wind speed</span>
        <span class="stat-value" th:text="${weather.windSpeed()}"></span>
        <span class="stat-sub">km/h</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Humidity</span>
        <span class="stat-value" th:text="${weather.humidity()} + '%'"></span>
        <span class="stat-sub">air moisture</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Coordinates</span>
        <span class="stat-value" style="font-size:1.1rem;"
              th:text="${#numbers.formatDecimal(weather.latitude(),1,1)} + ', ' + ${#numbers.formatDecimal(weather.longitude(),1,1)}"></span>
        <span class="stat-sub" th:text="'WMO code ' + ${weather.weatherCode()}"></span>
      </div>
    </div>

  </section>

  <!-- ── Forecast zone ────────────────────────────────────────── -->
  <div id="forecast" class="forecast-zone">

    <!-- Hourly -->
    <div>
      <div class="forecast-heading">
        <span class="section-eyebrow">Next 12 hours</span>
        <h2 class="section-title">Hourly</h2>
      </div>
      <div class="forecast-panel">
        <div class="hourly-scroll">
          <div th:each="hour : ${weather.hourlyForecasts()}" class="hour-card">
            <span class="hour-label"  th:text="${hour.label()}"></span>
            <span class="weather-icon hour-symbol" th:classappend="' ' + ${hour.symbolClass()}"></span>
            <span class="hour-temp"   th:text="${hour.temperature()} + '°'"></span>
            <span class="hour-cond"   th:text="${hour.condition()}"></span>
            <span class="hour-precip" th:text="${hour.precipitationProbability()} + '% rain'"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- 10-day -->
    <div id="ten-day">
      <div class="forecast-heading">
        <span class="section-eyebrow">10-day outlook</span>
        <h2 class="section-title">Daily Forecast</h2>
      </div>
      <div class="forecast-panel">

        <!-- Selected day detail -->
        <div th:if="${selectedDailyForecast != null}" class="selected-panel">
          <div class="selected-panel-header">
            <span class="selected-day-title"
                  th:text="${selectedDailyForecast.dayLabel()} + ' · ' + ${selectedDailyForecast.dateLabel()}"></span>
            <span class="weather-icon sel-symbol" th:classappend="' ' + ${selectedDailyForecast.symbolClass()}"></span>
          </div>
          <div class="selected-stat">
            <span class="selected-stat-label">Condition</span>
            <span class="selected-stat-value" th:text="${selectedDailyForecast.condition()}"></span>
          </div>
          <div class="selected-stat">
            <span class="selected-stat-label">High / Low</span>
            <span class="selected-stat-value"
                  th:text="${selectedDailyForecast.highTemperature()} + '° / ' + ${selectedDailyForecast.lowTemperature()} + '°'"></span>
          </div>
          <div class="selected-stat">
            <span class="selected-stat-label">Precipitation</span>
            <span class="selected-stat-value" th:text="${selectedDailyForecast.precipitationProbability()} + '%'"></span>
          </div>
        </div>

        <div class="day-grid">
          <a th:each="day, s : ${weather.dailyForecasts()}"
             class="day-card"
             th:classappend="${selectedDayIndex == s.index} ? ' is-selected' : ''"
             th:href="@{/(city=${weather.cityName()},countryCode=${selectedCountry},dayIndex=${s.index})+'#ten-day'}">
            <div class="day-header">
              <span class="day-name" th:text="${day.dayLabel()}"></span>
              <span class="day-date" th:text="${day.dateLabel()}"></span>
            </div>
            <span class="weather-icon day-symbol" th:classappend="' ' + ${day.symbolClass()}"></span>
            <div class="day-temps">
              <span class="day-high" th:text="${day.highTemperature()} + '°'"></span>
              <span class="day-low"  th:text="${day.lowTemperature()}  + '°'"></span>
            </div>
            <span class="day-cond"   th:text="${day.condition()}"></span>
            <span class="day-precip" th:text="${day.precipitationProbability()} + '% rain'"></span>
          </a>
        </div>
      </div>
    </div>

  </div><!-- /forecast-zone -->
</div><!-- /page-shell -->

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script>
  new TomSelect('#countryCode', { placeholder: 'Any country', allowEmptyOption: true, maxOptions: null });
</script>
</body>
</html>
