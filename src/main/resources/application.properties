server.port=8080

# ── Local dev: H2 in-memory (overridden by Docker/Railway env vars) ───
spring.datasource.url=jdbc:h2:mem:weatherdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ───────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── GitHub OAuth2 SSO ─────────────────────────────────────────────────
# Set GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET as environment variables
# locally (export) or in Railway project settings
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:change-me}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:change-me}
