
services:

  # ── Spring Boot App ──────────────────────────────────────────────
  app:
    build: .
    container_name: portfolio-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/portfoliodb
      - SPRING_DATASOURCE_USERNAME=portfolio_user
      - SPRING_DATASOURCE_PASSWORD=portfolio_pass
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_H2_CONSOLE_ENABLED=false
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_DB: portfoliodb
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: portfolio_pass
    ports:
      - "5432:5432"           # expose so you can connect with DBeaver/pgAdmin
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfoliodb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── pgAdmin (optional DB browser UI) ────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: portfolio-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@portfolio.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"             # visit http://localhost:5050
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
